  <main id="main" class="contact">
    <h1 class="visually-hidden">Contact Information</h1>
    <div class="contact-clock" id="contact-clock" aria-hidden="true">00:00:00</div>
    <div class="contact-list" id="contact-list"></div>
  </main>

  <script>
    (function () {
      var list = document.getElementById('contact-list');
      if (!list) return;
      var mail = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" focusable="false"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>';
      var insta = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" focusable="false"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>';
      function row(hidden) {
        return '<div class="contact-row"' + (hidden ? ' aria-hidden="true"' : '') + '>' +
          '<a href="mailto:contact@virginiaedwardsdesign.com">' + mail + 'contact@virginiaedwardsdesign.com</a>' +
          '<a href="https://instagram.com/virginiaedwardsdesign" target="_blank" rel="noopener">' + insta + '@virginiaedwardsdesign</a>' +
        '</div>';
      }
      list.insertAdjacentHTML('beforeend', row(false));
      for (var i = 0; i < 10; i++) list.insertAdjacentHTML('beforeend', row(true));
    })();
  </script>
  <script src="js/script.js"></script>
</body>
</html>
